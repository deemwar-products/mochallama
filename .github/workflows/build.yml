# CI: fast compile sanity check on every push / PR.
#
# This is intentionally LIGHT — a single ubuntu job that only verifies the
# Java/Gradle build compiles. It does NOT build the native llama.cpp libs
# (that's slow and platform-specific); `buildNative` is excluded with -x.
#
# Cross-platform native builds + release assets live in release.yml (tags),
# so this workflow no longer fans out a 4-platform matrix on every push and
# no longer jams the scarce macOS runners.
name: build

on:
  push:
    branches: [main, master, dev]
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
  pull_request:
    branches: [main, master, dev]
    paths-ignore:
      - 'docs/**'
      - '**/*.md'

concurrency:
  group: build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  compile:
    name: compile check (ubuntu)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 22
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '22'
          cache: gradle

      # -x buildNative: compilation does not need the dylibs (they're a runtime
      # resource), so skip the expensive CMake/llama.cpp build for this check.
      - name: Compile (no native, no tests)
        run: ./gradlew compileJava compileTestJava -x buildNative --no-daemon --stacktrace
