# Tier 2 — build + publish a mochallama RELEASE (frequent, every version bump).
#
# This NEVER compiles native code. It downloads the prebuilt per-platform native
# closures from the durable `natives-b9371` release (produced by natives.yml) and
# stages them, which satisfies buildNative's upToDateWhen guard — so the jars and
# jlink images are just packaged, not compiled.
#
#   publish-maven : THE LIBRARY. One Linux runner. Stages all 5 platforms' natives
#                   into core resources -> classifier jars -> signed Central bundle.
#                   Fully decoupled from any Mac/Windows runner.
#   build-cli     : per-platform jlink image + npm tarball, for the 4 platforms with
#                   reliable runners. darwin-x64 (Intel mac, scarce macos-13) is NOT
#                   here — it is built + published LOCALLY (see Taskfile cli:npm:*).
#   publish-npm   : OIDC trusted publish of the 4 CI platform packages (no token).
#                   The launcher is published LOCALLY, LAST, after darwin-x64, so all
#                   five optionalDependencies resolve.
#   release       : attach npm tarballs + natives + app fat jar to the GitHub Release.

name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  NATIVES_RELEASE: natives-b9371
  # Durable prerelease holding the locally-built Intel (darwin-x64) jlink image.
  # Seeded from a Mac with `task cli:stage-darwin-x64` (no Intel CI runner exists).
  CLI_DARWIN_X64_RELEASE: cli-darwin-x64
  CLI_DARWIN_X64_IMAGE: mochallama-cli-image-darwin-x64.zip

jobs:
  # --------------------------------------------------------------------------
  # THE LIBRARY — Maven Central. Pure CI, one Linux runner, no native compile.
  # --------------------------------------------------------------------------
  publish-maven:
    name: publish Maven Central
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '22'

      - name: Download prebuilt natives (all platforms)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -eu
          mkdir -p dist/natives core/src/main/resources/native
          gh release download "$NATIVES_RELEASE" -R "$GITHUB_REPOSITORY" -p '*.zip' -D dist/natives
          for z in dist/natives/*.zip; do echo "stage $z"; unzip -o "$z" -d core/src/main/resources/native/ >/dev/null; done
          echo "Staged platforms:"; ls -1 core/src/main/resources/native/

      - name: Publish to staging, bundle, upload to Central (AUTOMATIC)
        env:
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
          SIGNING_PASSWORD: ${{ secrets.SIGNING_PASSWORD }}
          CENTRAL_USERNAME: ${{ secrets.CENTRAL_USERNAME }}
          CENTRAL_PASSWORD: ${{ secrets.CENTRAL_PASSWORD }}
        run: |
          set -eu
          : "${CENTRAL_USERNAME:?set the CENTRAL_USERNAME repo secret}"
          VER=$(grep -oE "version = '[0-9][^']*'" build.gradle | grep -oE '[0-9][^'\'']*')
          # Idempotent: skip if this version is already on Maven Central.
          if curl -sfo /dev/null "https://repo1.maven.org/maven2/io/github/deemwario/mochallama-core/${VER}/mochallama-core-${VER}.pom"; then
            echo "Maven Central already has ${VER} — skipping."; exit 0
          fi
          # -PuseStagedNatives makes buildNative HARD-SKIP (onlyIf) since the bridge
          # is already staged — nothing compiles, the downloaded source natives stand.
          ./gradlew publishAllPublicationsToCentralStagingRepository -PuseStagedNatives --no-daemon --stacktrace
          ( cd build/central-staging && zip -qr ../central-bundle.zip . -x '*.DS_Store' -x '*maven-metadata*' )
          echo "signatures: $(unzip -l build/central-bundle.zip | grep -c '\.asc$')"
          TOKEN=$(printf '%s' "$CENTRAL_USERNAME:$CENTRAL_PASSWORD" | base64)
          curl -sS --fail-with-body -X POST -H "Authorization: Bearer $TOKEN" \
            -F bundle=@build/central-bundle.zip \
            "https://central.sonatype.com/api/v1/publisher/upload?name=mochallama-${VER}&publishingType=AUTOMATIC"

  # --------------------------------------------------------------------------
  # CLI jlink images + npm tarballs — the 4 platforms with reliable runners.
  # darwin-x64 is built + published LOCALLY (no Intel-mac CI runner).
  # --------------------------------------------------------------------------
  build-cli:
    name: cli (${{ matrix.platkey }})
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.experimental }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,    native_key: linux-x86_64,   platkey: linux-x64,    experimental: false }
          - { os: ubuntu-24.04-arm, native_key: linux-aarch64,  platkey: linux-arm64,  experimental: false }
          - { os: macos-14,         native_key: darwin-aarch64, platkey: darwin-arm64, experimental: false }
          - { os: windows-latest,   native_key: windows-x86_64, platkey: win32-x64,    experimental: true  }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '22'
      - name: Set up CMake
        uses: lukka/get-cmake@latest

      - name: Download this platform's prebuilt natives
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -eu
          mkdir -p dl core/src/main/resources/native
          gh release download "$NATIVES_RELEASE" -R "$GITHUB_REPOSITORY" \
            -p "mochallama-natives-${{ matrix.native_key }}.zip" -D dl
          unzip -o dl/*.zip -d core/src/main/resources/native/ >/dev/null
          ls -1 "core/src/main/resources/native/${{ matrix.native_key }}"

      # Load oracle: prove the DOWNLOADED natives actually load on THIS platform
      # before we package + publish them (catches a Metal/split-ggml/bad-closure
      # mismatch that a green jlink would not). buildNative hard-skips (staged).
      - name: Native load smoke (Unix)
        if: runner.os != 'Windows'
        run: ./gradlew :core:test --tests '*NativeLoadSmoke*' -PuseStagedNatives --no-daemon --stacktrace

      - name: Native load smoke (Windows)
        if: runner.os == 'Windows'
        run: .\gradlew.bat :core:test --tests "*NativeLoadSmoke*" -PuseStagedNatives --no-daemon --stacktrace

      - name: Build jlink image (Unix)
        if: runner.os != 'Windows'
        run: ./gradlew :cli:jlink -PuseStagedNatives --no-daemon --stacktrace

      - name: Build jlink image (Windows)
        if: runner.os == 'Windows'
        run: .\gradlew.bat :cli:jlink -PuseStagedNatives --no-daemon --stacktrace

      - name: Stage jlink image into platform npm package
        shell: bash
        run: |
          set -eu
          plat="cli/npm/platforms/${{ matrix.platkey }}"
          rm -rf "$plat/image"; mkdir -p "$plat/image"
          cp -R cli/build/image/. "$plat/image/"
          ls -la "$plat/image/bin" || true

      - name: Pack platform npm package
        shell: bash
        run: |
          set -eu
          cd "cli/npm/platforms/${{ matrix.platkey }}"
          npm pack
          ls -la ./*.tgz

      - name: Upload platform npm tarball
        uses: actions/upload-artifact@v4
        with:
          name: npm-${{ matrix.platkey }}
          path: cli/npm/platforms/${{ matrix.platkey }}/*.tgz
          if-no-files-found: warn
          retention-days: 30

  # --------------------------------------------------------------------------
  # darwin-x64 (Intel mac) npm package. No Intel CI runner exists, so instead of
  # BUILDING the jlink image here we DOWNLOAD the one staged locally into the
  # `cli-darwin-x64` release (task cli:stage-darwin-x64), stamp the bump version,
  # and npm-pack it on ubuntu (packing is platform-independent). The resulting
  # tarball is published via OIDC alongside the 4 CI-built platforms — no local
  # npm publish, no 2FA.
  # --------------------------------------------------------------------------
  cli-darwin-x64:
    name: cli (darwin-x64, staged image)
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Download staged Intel jlink image
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -eu
          mkdir -p dl
          gh release download "$CLI_DARWIN_X64_RELEASE" -R "$GITHUB_REPOSITORY" \
            -p "$CLI_DARWIN_X64_IMAGE" -D dl
          plat=cli/npm/platforms/darwin-x64
          rm -rf "$plat/image"; mkdir -p "$plat/image"
          unzip -o "dl/$CLI_DARWIN_X64_IMAGE" -d "$plat/image" >/dev/null
          if [ -f "$plat/image/STAGED_FROM_SHA" ]; then
            echo "Intel image staged from commit: $(cat "$plat/image/STAGED_FROM_SHA")"
            rm -f "$plat/image/STAGED_FROM_SHA"
          fi
          ls -la "$plat/image/bin" || true
      - name: Pack darwin-x64 npm package
        run: |
          set -eu
          cd cli/npm/platforms/darwin-x64
          npm pack
          ls -la ./*.tgz
      - name: Upload darwin-x64 npm tarball
        uses: actions/upload-artifact@v4
        with:
          name: npm-darwin-x64
          path: cli/npm/platforms/darwin-x64/*.tgz
          if-no-files-found: error
          retention-days: 30

  # --------------------------------------------------------------------------
  # Publish ALL npm packages via OIDC trusted publishing (no token, no 2FA):
  # the 4 CI-built platforms + the staged darwin-x64 + the launcher LAST (so all
  # five optionalDependencies already resolve when the launcher lands).
  # Each package needs a Trusted Publisher configured once on npmjs.com
  # (Settings -> Trusted Publisher -> GitHub Actions, repo + release.yml).
  # --------------------------------------------------------------------------
  publish-npm:
    name: publish npm (OIDC)
    needs: [build-cli, cli-darwin-x64]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
      - name: Upgrade npm (OIDC trusted publishing needs npm >= 11.5.1)
        run: npm install -g npm@latest
      - name: Download platform npm tarballs
        uses: actions/download-artifact@v8
        with:
          pattern: npm-*
          path: dist/npm
      - name: Publish platform packages then launcher (OIDC, idempotent)
        run: |
          set -e
          # Skip any (name, version) already on the registry so re-runs don't 403.
          publish_tgz () {
            local tgz="$1"
            local name ver
            # Read name + version straight from the tarball's package.json.
            name=$(tar -xzOf "$tgz" package/package.json | node -e "let s='';process.stdin.on('data',d=>s+=d).on('end',()=>console.log(JSON.parse(s).name))")
            ver=$(tar -xzOf "$tgz" package/package.json | node -e "let s='';process.stdin.on('data',d=>s+=d).on('end',()=>console.log(JSON.parse(s).version))")
            if npm view "$name@$ver" version >/dev/null 2>&1; then
              echo "skip $name@$ver (already published)"
            else
              echo "publish $name@$ver  ($tgz)"
              npm publish "$tgz" --access public
            fi
          }
          # Platform packages first (order among them doesn't matter).
          for t in dist/npm/npm-*/*.tgz; do publish_tgz "$t"; done
          # Launcher LAST, so its 5 optionalDependencies all already resolve.
          cd cli/npm && npm pack && cd - >/dev/null
          publish_tgz cli/npm/*.tgz

  # --------------------------------------------------------------------------
  # Attach build outputs to the GitHub Release (tag-only).
  # --------------------------------------------------------------------------
  release:
    name: assemble release assets
    needs: [build-cli, cli-darwin-x64]
    if: ${{ !cancelled() && startsWith(github.ref, 'refs/tags/v') }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '22'

      - name: Download prebuilt natives
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -eu
          mkdir -p dist/natives core/src/main/resources/native
          gh release download "$NATIVES_RELEASE" -R "$GITHUB_REPOSITORY" -p '*.zip' -D dist/natives
          for z in dist/natives/*.zip; do unzip -o "$z" -d core/src/main/resources/native/ >/dev/null; done

      - name: Download platform npm tarballs
        uses: actions/download-artifact@v8
        with:
          pattern: npm-*
          path: artifacts

      - name: Assemble app fat JAR (best-effort)
        continue-on-error: true
        run: ./gradlew :app:bootJar -PuseStagedNatives --no-daemon --stacktrace

      - name: Collect release assets
        shell: bash
        run: |
          set -eu
          mkdir -p release-assets
          shopt -s nullglob
          for t in artifacts/npm-*/*.tgz; do cp "$t" release-assets/; done
          for z in dist/natives/*.zip; do cp "$z" release-assets/; done
          for j in app/build/libs/*.jar; do cp "$j" release-assets/ 2>/dev/null || true; done
          echo "Release assets:"; ls -la release-assets

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            release-assets/*
