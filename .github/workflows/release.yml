# Release: tag-driven cross-platform build -> GitHub Release.
#
# On a v* tag (or manual dispatch) a matrix builds, per platform:
#   - that platform's native llama.cpp + bridge libs (via :core:buildNative,
#     which now stages into src/main/resources/native/<host-key>/ — see
#     core/build.gradle)
#   - that platform's jlink runtime image (:cli:jlink)
#   - the per-platform npm package tarball (image copied into
#     cli/npm/platforms/<platkey>/image, then `npm pack`)
#   - a zip of the platform's native libs
#
# A final `release` job downloads every artifact, packs the main npm launcher,
# and attaches everything to the GitHub Release.
#
# TODO: code signing / notarization / Maven Central / npm publish are out of
# scope here — this builds and attaches release assets only.

name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build:
    name: build (${{ matrix.native_key }})
    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.experimental }}
    # Hard cap so a flaky runner can never hang the release for 24h again
    # (the macos-13 Intel leg did exactly that). The slowest leg is a clean
    # macos-14 arm64 llama.cpp build (~95m), so 150m is generous headroom.
    timeout-minutes: 150
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux: build from SOURCE. The prebuilt linux release ships a SPLIT
          # ggml-cpu (15 arch dylibs, runtime-dispatched) + no single ggml-cpu —
          # incompatible with NativeLoader. A source build yields one ggml-cpu.
          - os: ubuntu-latest
            native_key: linux-x86_64
            platkey: linux-x64
            native_mode: source
            experimental: false
          # Linux ARM64 (AWS Graviton, cloud ARM, Raspberry Pi) — free GitHub
          # ARM runner, source build (same single-ggml-cpu reason as x86_64).
          - os: ubuntu-24.04-arm
            native_key: linux-aarch64
            platkey: linux-arm64
            native_mode: source
            experimental: false
          # darwin-aarch64 (Apple Silicon / M1): SOURCE — the macOS arm64 prebuilt
          # libggml hard-links @rpath/libggml-metal (Metal GPU backend) which we
          # don't bundle, so it fails to load. A CPU-only source build avoids the
          # Metal dependency (Metal accel is a future enhancement). darwin-x86_64
          # (Intel) is built LOCALLY: its prebuilt has no Metal dep and loads.
          - os: macos-14
            native_key: darwin-aarch64
            platkey: darwin-arm64
            native_mode: source
            experimental: false
          # Windows: build from SOURCE too (same split-ggml-cpu reason as Linux,
          # plus the prebuilt zip ships no import .lib for MSVC linking). Still
          # experimental until the native smoke passes here.
          - os: windows-latest
            native_key: windows-x86_64
            platkey: win32-x64
            native_mode: source
            experimental: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 22
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '22'

      - name: Set up CMake
        uses: lukka/get-cmake@latest

      - name: Set up MSVC (Windows only)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      # Cache the staged native libs keyed on the llama.cpp tag + our C bridge
      # sources. On a hit, buildNative's outputs.upToDateWhen guard fires and
      # the ~95m CMake/llama.cpp compile is skipped entirely — repeat releases
      # for an unchanged bridge are then near-instant.
      - name: Cache staged natives
        id: cache-natives
        uses: actions/cache@v4
        with:
          path: core/src/main/resources/native/${{ matrix.native_key }}
          key: natives-${{ matrix.native_key }}-b9371-${{ hashFiles('core/src/main/cpp/**') }}

      - name: Clone vendored llama.cpp (pinned tag b9371)
        if: steps.cache-natives.outputs.cache-hit != 'true'
        shell: bash
        run: |
          git clone --depth 1 -b b9371 https://github.com/ggerganov/llama.cpp \
            core/src/main/native/llama.cpp

      - name: Build native libs (Unix)
        if: runner.os != 'Windows'
        run: ./gradlew :core:buildNative -Pnative=${{ matrix.native_mode }} --no-daemon --stacktrace

      - name: Build native libs (Windows)
        if: runner.os == 'Windows'
        run: .\gradlew.bat :core:buildNative -Pnative=${{ matrix.native_mode }} --no-daemon --stacktrace

      # Runtime oracle: prove the just-staged native closure actually LOADS in a
      # JVM on this OS (no model needed — calls llb_version). A build-only green
      # check does not catch a wrong ggml backend / missing dep / bad import.
      - name: Native load smoke (Unix)
        if: runner.os != 'Windows'
        run: ./gradlew :core:test --tests '*NativeLoadSmoke*' -Pnative=${{ matrix.native_mode }} --no-daemon --stacktrace

      - name: Native load smoke (Windows)
        if: runner.os == 'Windows'
        run: .\gradlew.bat :core:test --tests "*NativeLoadSmoke*" -Pnative=${{ matrix.native_mode }} --no-daemon --stacktrace

      - name: Show staged natives
        shell: bash
        run: |
          dir="core/src/main/resources/native/${{ matrix.native_key }}"
          echo "Contents of $dir:"
          ls -la "$dir" || echo "(missing — buildNative did not stage this platform)"

      # --- LIBRARY artifact (the natives) — captured BEFORE the CLI jlink/npm
      # steps so a CLI-packaging failure on a platform never loses the natives
      # the library publish needs (the Windows jlink leg hit exactly this). ---
      - name: Zip native libs
        shell: bash
        run: |
          set -eu
          src="core/src/main/resources/native/${{ matrix.native_key }}"
          mkdir -p dist-natives
          if [ -d "$src" ]; then
            ( cd "$src/.." && zip -r "$GITHUB_WORKSPACE/dist-natives/mochallama-natives-${{ matrix.native_key }}.zip" "${{ matrix.native_key }}" )
          else
            echo "No natives dir for ${{ matrix.native_key }} — skipping zip."
          fi
          ls -la dist-natives || true

      - name: Upload natives zip
        uses: actions/upload-artifact@v4
        with:
          name: natives-${{ matrix.native_key }}
          path: dist-natives/*.zip
          if-no-files-found: warn
          retention-days: 30

      # --- CLI image + npm tarball (best-effort; failure here must not fail the
      # native/library artifact above). ---
      - name: Build jlink image (Unix)
        if: runner.os != 'Windows'
        continue-on-error: true
        run: ./gradlew :cli:jlink --no-daemon --stacktrace

      - name: Build jlink image (Windows)
        if: runner.os == 'Windows'
        continue-on-error: true
        run: .\gradlew.bat :cli:jlink --no-daemon --stacktrace

      - name: Stage jlink image into platform npm package
        continue-on-error: true
        shell: bash
        run: |
          set -eu
          plat="cli/npm/platforms/${{ matrix.platkey }}"
          [ -d "$plat" ] || { echo "no npm platform dir $plat — skipping"; exit 0; }
          rm -rf "$plat/image"
          mkdir -p "$plat/image"
          cp -R cli/build/image/. "$plat/image/"
          ls -la "$plat/image/bin" || true

      - name: Pack platform npm package
        continue-on-error: true
        shell: bash
        run: |
          set -eu
          plat="cli/npm/platforms/${{ matrix.platkey }}"
          [ -d "$plat" ] || { echo "no npm platform dir $plat — skipping"; exit 0; }
          cd "$plat"
          npm pack
          ls -la ./*.tgz

      - name: Upload platform npm tarball
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: npm-${{ matrix.platkey }}
          path: cli/npm/platforms/${{ matrix.platkey }}/*.tgz
          if-no-files-found: warn
          retention-days: 30

  release:
    name: assemble release assets
    needs: build
    # Run even if an experimental/failed leg dropped out — assemble from
    # whatever artifacts the matrix did produce.
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 22
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '22'

      - name: Set up CMake
        uses: lukka/get-cmake@latest

      - name: Clone vendored llama.cpp (pinned tag b9371)
        shell: bash
        run: |
          git clone --depth 1 -b b9371 https://github.com/ggerganov/llama.cpp \
            core/src/main/native/llama.cpp

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Pack main npm launcher
        shell: bash
        run: |
          set -eu
          cd cli/npm
          npm pack
          ls -la ./*.tgz

      - name: Stage all natives into resources (for the fat JAR)
        shell: bash
        run: |
          set -eu
          mkdir -p core/src/main/resources/native
          shopt -s nullglob
          for z in artifacts/natives-*/*.zip; do
            echo "Unzipping $z"
            unzip -o "$z" -d core/src/main/resources/native/
          done
          echo "Staged native layout:"
          find core/src/main/resources/native -maxdepth 2 -type d | sort

      - name: Assemble app fat JAR (best-effort)
        id: fatjar
        continue-on-error: true
        run: ./gradlew :app:bootJar --no-daemon --stacktrace

      - name: Collect release assets
        shell: bash
        run: |
          set -eu
          mkdir -p release-assets
          shopt -s nullglob
          # Per-platform npm tarballs.
          for t in artifacts/npm-*/*.tgz; do cp "$t" release-assets/; done
          # Main npm launcher tarball.
          for t in cli/npm/*.tgz; do cp "$t" release-assets/; done
          # Natives zips.
          for z in artifacts/natives-*/*.zip; do cp "$z" release-assets/; done
          # Fat JAR, if it built.
          for j in app/build/libs/*.jar; do cp "$j" release-assets/ 2>/dev/null || true; done
          echo "Release assets:"
          ls -la release-assets

      # Always surface the assembled assets as a downloadable workflow artifact.
      # This is the "just build, no push" path: a manual dispatch produces the
      # Linux/Windows/arm64 binaries here, you `gh run download` them, combine
      # with the locally-built darwin-x86_64, and publish from the dev machine.
      - name: Upload combined release-assets bundle
        uses: actions/upload-artifact@v4
        with:
          name: release-assets
          path: release-assets/*
          if-no-files-found: warn
          retention-days: 30

      # Push a GitHub Release ONLY for a real v* tag. Manual dispatches (and
      # branch runs) just build + upload the artifact above — they never push.
      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            release-assets/*
