# Taskfile for the mochallama multi-project (go-task v3).
#
# Requires JDK 22 (Project Panama FFM + jdk.incubator.vector). Set JAVA_HOME to
# a JDK 22 below, or export it in your shell before running. The Gradle build
# also pins a Java 22 toolchain, so Gradle will locate a 22 JDK if installed.
#
#   task --list      # see every task
#   task build       # build everything
#   task release      # build + test + publish-local + jlink image, then prints next steps
version: '3'

env:
  # JDK 22 home. Override per-machine if your install path differs.
  JAVA_HOME: /Users/muthuishere/Library/Java/JavaVirtualMachines/temurin-22.0.1/Contents/Home

vars:
  IMAGE_DIR: cli/build/image
  NPM_DIR: cli/npm

tasks:
  default:
    desc: List all available tasks.
    cmds:
      - task --list
    silent: true

  build:
    desc: Build all subprojects (core lib, app, cli).
    cmds:
      - ./gradlew build

  native:
    desc: Build the vendored llama.cpp + C bridge and stage the dylibs into core resources.
    cmds:
      - ./gradlew :core:buildNative

  test:
    desc: Run the full test suite across all subprojects.
    cmds:
      - ./gradlew test

  publish:local:
    desc: Publish mochallama core + starter + spring-ai to the local Maven repo (~/.m2). Core bundles the native dylibs.
    cmds:
      - ./gradlew :core:publishToMavenLocal :starter:publishToMavenLocal :spring-ai:publishToMavenLocal
      - 'echo ""'
      - 'echo "Published to ~/.m2/repository/tools/deemwar/:"'
      - 'echo "  mochallama-core (bundles the darwin-x86_64 llama.cpp dylibs — no separate native install needed)"'
      - 'echo "  mochallama-spring-boot-starter (Spring-AI-free)"'
      - 'echo "  mochallama-spring-ai (Spring AI supplied by the consumer)"'

  release:download:
    desc: 'Download CI-built natives (linux / darwin-aarch64 / windows) from a release run and stage them next to the local darwin-x86_64 build, for a COMPLETE multi-platform core jar. Optional RUN_ID=<id>; defaults to the latest successful release run.'
    vars:
      REPO: deemwar-products/mochallama
      RUN_ID: '{{.RUN_ID | default ""}}'
    cmds:
      - |
        set -eu
        RID="{{.RUN_ID}}"
        if [ -z "$RID" ]; then
          RID=$(gh run list -R {{.REPO}} --workflow release.yml \
                  --json databaseId,conclusion \
                  -q 'map(select(.conclusion=="success"))[0].databaseId')
        fi
        [ -n "$RID" ] || { echo "No successful release run found. Trigger one: gh workflow run release.yml"; exit 1; }
        echo "Downloading natives from release run $RID ..."
        rm -rf dist/ci && mkdir -p dist/ci
        # ONLY the natives-* artifacts (downloading everything collides on the npm tarballs).
        gh run download "$RID" -R {{.REPO}} -D dist/ci -p 'natives-*'
        # Stage each natives-*.zip alongside the locally-built darwin-x86_64 libs.
        shopt -s nullglob
        for z in dist/ci/natives-*/*.zip dist/ci/release-assets/mochallama-natives-*.zip; do
          echo "  staging $z"; unzip -o "$z" -d core/src/main/resources/native/ >/dev/null
        done
      - 'echo "Staged native platforms (this should now list darwin-x86_64 + the CI platforms):"'
      - ls -1 core/src/main/resources/native/

  publish:central:bundle:
    desc: 'Build the signed Central Portal bundle (build/central-bundle.zip). Reads creds from .env + the key from $SIGNING_KEY_FILE. Run `task release:download` first for all-platform natives.'
    dotenv: ['.env']
    cmds:
      - rm -rf build/central-staging build/central-bundle.zip
      - |
        keyfile="${SIGNING_KEY_FILE:-.seckey}"
        [ -f "$keyfile" ] || { echo "signing key file '$keyfile' not found (see .env / PUBLISHING.md)"; exit 1; }
        SIGNING_KEY="$(cat "$keyfile")" SIGNING_PASSWORD="${SIGNING_PASSWORD:-}" \
          ./gradlew publishAllPublicationsToCentralStagingRepository
      - |
        cd build/central-staging
        # Central Portal wants a zip of the maven-repo layout (group path at the
        # root). Exclude maven-metadata.xml (Central generates its own) and junk.
        rm -f ../../build/central-bundle.zip
        zip -qr ../central-bundle.zip . -x '*.DS_Store' -x '*maven-metadata*'
      - 'echo "Bundle: build/central-bundle.zip"'
      - 'echo "Signatures in bundle: $(unzip -l build/central-bundle.zip | grep -c ''\.asc$'') (must be > 0)"'

  publish:central:
    desc: 'Publish to Maven Central (Central Portal). Reads CENTRAL_USERNAME/PASSWORD + signing from .env. Builds the signed bundle then uploads (USER_MANAGED — you click Publish on the Portal). See PUBLISHING.md.'
    dotenv: ['.env']
    deps: [publish:central:bundle]
    cmds:
      - |
        : "${CENTRAL_USERNAME:?set CENTRAL_USERNAME (Central Portal token user)}"
        : "${CENTRAL_PASSWORD:?set CENTRAL_PASSWORD (Central Portal token password)}"
        TOKEN=$(printf '%s' "$CENTRAL_USERNAME:$CENTRAL_PASSWORD" | base64)
        echo "Uploading build/central-bundle.zip to Central Portal ..."
        curl -sS --fail-with-body -X POST \
          -H "Authorization: Bearer $TOKEN" \
          -F bundle=@build/central-bundle.zip \
          "https://central.sonatype.com/api/v1/publisher/upload?name=mochallama-0.1.0&publishingType=USER_MANAGED"
        echo ""
        echo "Uploaded. Review + click Publish at https://central.sonatype.com/publishing/deployments"

  cli:image:
    desc: Build the self-contained jlink runtime image for the CLI (cli/build/image/bin/mochallama).
    cmds:
      - ./gradlew :cli:jlink

  cli:run:
    desc: 'Run the CLI through Gradle, forwarding args. e.g. task cli:run -- models'
    cmds:
      - ./gradlew :cli:run --args="{{.CLI_ARGS}}"

  cli:npm:pack:
    desc: Build the jlink image, stage it into the darwin-x64 platform package, and `npm pack` both the platform + main launcher tarballs (LOCAL = darwin-x64 only).
    deps:
      - cli:image
    vars:
      PLAT_DIR: '{{.NPM_DIR}}/platforms/darwin-x64'
    cmds:
      # Populate the local platform package's image dir from the jlink output.
      - rm -rf {{.PLAT_DIR}}/image
      - mkdir -p {{.PLAT_DIR}}/image
      - cp -R {{.IMAGE_DIR}}/. {{.PLAT_DIR}}/image/
      # Pack the platform package (with its image) and the main launcher.
      - cd {{.PLAT_DIR}} && npm pack
      - cd {{.NPM_DIR}} && npm pack
      - 'echo ""'
      - 'echo "Tarballs written:"'
      - 'echo "  platform: {{.PLAT_DIR}}/*.tgz   (bundles the darwin-x64 jlink image)"'
      - 'echo "  launcher: {{.NPM_DIR}}/*.tgz     (resolves the platform pkg at runtime)"'
      - 'echo "Inspect with: tar tzf {{.PLAT_DIR}}/*.tgz | head"'

  cli:npm:publish:
    desc: 'PUBLISHES PUBLICLY to npm the darwin-x64 platform pkg + the main launcher. Other platforms publish from CI (release.yml). Builds + packs first.'
    deps:
      - cli:npm:pack
    cmds:
      - 'echo "WARNING: this publishes @deemwario/mochallama-darwin-x64 AND @deemwario/mochallama PUBLICLY to the npm registry."'
      - 'echo "The other platform packages are published by the release workflow. Ctrl-C within 5s to abort."'
      - sleep 5
      # Platform package first — the main launcher's optionalDependency must exist.
      - cd {{.NPM_DIR}}/platforms/darwin-x64 && npm publish --access public
      - cd {{.NPM_DIR}} && npm publish --access public

  docs:dev:
    desc: Run the VitePress docs site in dev mode (hot reload).
    cmds:
      - cd docs && npm install && npm run dev

  docs:build:
    desc: Build the static VitePress docs site.
    cmds:
      - cd docs && npm install && npm run build

  app:run:
    desc: Run the Spring Boot demo app (tools.deemwar.mochallama.MochallamaApplication).
    cmds:
      - ./gradlew :app:bootRun

  release:
    desc: 'Build + test + publish-local + jlink image. Does NOT auto-publish to Central/npm — prints manual next steps.'
    deps:
      - build
      - test
      - publish:local
      - cli:image
    cmds:
      - 'echo ""'
      - 'echo "================ release artifacts built ================"'
      - 'echo "  lib    : ~/.m2 mochallama-core (also run `task publish:central` once secrets exist)"'
      - 'echo "  cli     : {{.IMAGE_DIR}}/bin/mochallama (jlink runtime image)"'
      - 'echo ""'
      - 'echo "Next manual steps (intentionally NOT automated):"'
      - 'echo "  1. task cli:npm:pack       # produce the npm tarball, inspect it"'
      - 'echo "  2. task cli:npm:publish    # publish to npm (public)"'
      - 'echo "  3. task publish:central    # publish lib to Maven Central (needs creds)"'
      - 'echo "========================================================="'
