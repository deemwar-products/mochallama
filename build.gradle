// Root build script — multi-project configuration only.
// Per-subproject plugins (Spring Boot, java-library, etc.) live in core/ and app/.

allprojects {
    group = 'tools.deemwar'
    version = '0.1.0'
}

subprojects {
    apply plugin: 'java'

    java {
        toolchain {
            languageVersion = JavaLanguageVersion.of(22)
        }
    }

    repositories {
        mavenCentral()
    }

    tasks.withType(JavaCompile).configureEach {
        options.compilerArgs += ['--add-modules=jdk.incubator.vector']
    }

    tasks.withType(Test).configureEach {
        jvmArgs '--add-modules=jdk.incubator.vector',
                '--enable-native-access=ALL-UNNAMED'
        useJUnitPlatform()
        // Print full exception detail + native stdout/stderr to the console so
        // CI shows WHY a native load failed (UnsatisfiedLinkError reason) instead
        // of hiding it in the HTML report on the runner.
        testLogging {
            events 'passed', 'skipped', 'failed'
            exceptionFormat 'full'
            showStandardStreams true
        }
    }
}
