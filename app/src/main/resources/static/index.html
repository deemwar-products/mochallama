<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>mochallama</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="logo">mochallama</span>
      <span id="model-badge" class="badge" title="active model">loading…</span>
      <span id="state-dot" class="state-dot state-unknown" title="server state"></span>
    </div>
    <div class="model-picker">
      <label for="model-select" class="picker-label">model</label>
      <select id="model-select" title="The app loads one model per JVM. This list is informational."></select>
      <span id="model-notice" class="model-notice" hidden></span>
    </div>
  </header>

  <main id="messages" class="messages" aria-live="polite"></main>

  <footer class="composer">
    <div class="system-row">
      <label class="system-label">system prompt
        <input id="system-prompt" type="text" placeholder="(optional) e.g. You are terse." />
      </label>
    </div>
    <div class="settings">
      <label>max_tokens
        <input id="max-tokens" type="number" min="1" max="4096" step="1" value="256" />
      </label>
      <label>temperature
        <input id="temperature" type="number" min="0" max="2" step="0.1" value="0.7" />
      </label>
      <label>top_k
        <input id="top-k" type="number" min="0" max="200" step="1" value="40" />
      </label>
      <label>top_p
        <input id="top-p" type="number" min="0" max="1" step="0.05" value="0.95" />
      </label>
      <label class="stream-toggle">stream
        <input id="stream" type="checkbox" checked />
      </label>
    </div>
    <div class="input-row">
      <textarea id="input" rows="1" placeholder="Send a message…  (Enter to send, Shift+Enter for newline)"></textarea>
      <button id="send" type="button">Send</button>
    </div>
    <div id="stats" class="stats-line" title="live inference stats (actuator)">—</div>
  </footer>

  <script src="app.js"></script>
</body>
</html>
