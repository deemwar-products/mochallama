spring.application.name=mochallama
server.port=8080

# Inference observability — expose Actuator endpoints (see docs/specs/observability.md).
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always

# Default model: Qwen2.5-1.5B-Instruct (Q4_K_M).
# Chosen as the default because it is the PROVEN tool-caller in this lineup
# (the native agent's tool test passed on qwen2.5-1.5b-instruct-q4_k_m) AND it is
# the smallest/fastest of the kept models (~1.1 GB), so first boot is quick.
# Step up to qwen2.5-3b for stronger quality (same tool template, ~2.1 GB).
#
# To switch models, activate a profile: see docs/specs/models.md
#   ./gradlew bootRun --args='--spring.profiles.active=qwen2.5-3b'
# Available profiles (ALL tool-capable): qwen2.5-1.5b, qwen2.5-3b, qwen3-4b, phi-4-mini
llamacpp.model.url=https://huggingface.co/Qwen/Qwen2.5-1.5B-Instruct-GGUF/resolve/main/qwen2.5-1.5b-instruct-q4_k_m.gguf
llamacpp.model.filename=qwen2.5-1.5b-instruct-q4_k_m.gguf
llamacpp.model.cache-dir=${user.home}/.chatbot_models
llamacpp.model.context-size=4096
llamacpp.model.threads=4

# Generation defaults (per-request values from /v1/chat/completions override these).
llamacpp.model.max-tokens=256
llamacpp.model.temperature=0.7
llamacpp.model.top-k=40
llamacpp.model.top-p=0.95
llamacpp.model.min-p=0.05
llamacpp.model.repeat-penalty=1.0
llamacpp.model.seed=-1
